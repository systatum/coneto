name: Storybook Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Install netiploy
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/systatum/netiploy/main/install.sh \
            | bash

      - name: Deploy to Production R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_PROD_ACCOUNT_ID }}
        run: |
          netiploy deploy "storybook-static/*" to r2/coneto-com \
            --token="${{ secrets.R2_PROD_ACCESS_KEY_ID }}:${{ secrets.R2_PROD_SECRET_ACCESS_KEY }}" \
            --public-url="https://coneto.systatum.com"
