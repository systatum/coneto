name: Storybook Preview

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Show pnpm version
        run: pnpm --version
      - name: Debug workspace
        run: |
          pwd
          ls -lah
          cat pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Install netiploy
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/systatum/netiploy/main/install.sh \
            | bash

      - name: Compute deployment subfolder
        id: deploy
        run: |
          SUBFOLDER="${GITHUB_REF_NAME}"
          SAFE_SUBFOLDER=$(echo "$SUBFOLDER" | tr '/' '-')
          echo "subfolder=$SAFE_SUBFOLDER" >> $GITHUB_OUTPUT

      - name: Deploy to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          OUTPUT=$(netiploy deploy "storybook-static/*" to r2/systatum-dev/coneto \
            --subfolder=hash:${{ steps.deploy.outputs.subfolder }} \
            --token="${{ secrets.R2_ACCESS_KEY_ID }}:${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --public-url="https://dev.files.systatum.com")

          echo "$OUTPUT"

          PUBLIC_URL=$(echo "$OUTPUT" | grep "Public URL:" | sed 's/.*Public URL: //')

          if [ -n "$PUBLIC_URL" ]; then
            COMMENT="Coneto Storybook preview deployed to: $PUBLIC_URL"
          else
            COMMENT="Deployment finished, but no public URL was found.

          Full output:

          \`\`\`
          $OUTPUT
          \`\`\`"
          fi

          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${{ steps.netiploy.outputs.comment }}`
            })
